<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

html,body{
    width:100%;
    overflow-x:hidden;
    scroll-behavior:smooth;
    background:#0b1320;
    color:#fff;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:12px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0b1320;
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
    flex-wrap:wrap;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-circle{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    flex-shrink:0;
}

.logo-circle img{ width:85%; }

.logo-text h2{ font-size:16px; }
.logo-text p{ font-size:10px; color:#ccc; }

/* NAV */
nav{
    display:flex;
    align-items:center;
    gap:25px;
    flex-wrap:wrap;
}

nav a{
    color:#fff;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

nav a:hover{
    color:#ff7b00;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    padding:100px 8% 40px;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
    url('https://cdn.corenexis.com/f/mVUYQ6YSf6g.jpg') center/cover no-repeat;
}

.hero-content{
    max-width:700px;
}

.hero h1{
    font-size:60px;
    line-height:1.1;
}

.hero span{
    color:#ff7b00;
}

.hero p{
    margin:20px 0;
    color:#ddd;
    font-size:18px;
}

/* BUTTON ROW */
.hero-buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

/* BUTTONS (PC DEFAULT) */
.btn,
.btn-outline{
    display:inline-block;
    padding:14px 35px;
    border-radius:40px;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    transition:0.3s;
}

/* CONTACT */
.btn{
    background:#ff7b00;
    color:#fff;
}

/* BLOGS */
.btn-outline{
    background:linear-gradient(135deg, #1e90ff, #00c6ff);
    color:#fff;
}

/* FLOATING */
.floating{
    position:fixed;
    right:20px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.floating a{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:22px;
    text-decoration:none;
}

.phone{background:#ff7b00;}
.email{background:#1e90ff;}
.whatsapp{background:#25d366;}

/* ================= RESPONSIVE ================= */

@media(max-width:1024px){
.hero h1{font-size:48px;}
.hero p{font-size:16px;}
}

@media(max-width:768px){

header{
    flex-direction:column;
    align-items:center;
    gap:10px;
}

nav{
    justify-content:center;
    gap:15px;
}

.hero{
    text-align:center;
    justify-content:center;
    padding-top:160px;
}

.hero h1{
    font-size:38px;
}
}

/* ✅ MOBILE BUTTON SIZE CHANGE (IMPORTANT PART) */
@media(max-width:480px){

nav a{
    font-size:14px;
}

.hero h1{
    font-size:30px;
}

/* 🔥 SMALLER BUTTONS ONLY ON MOBILE */
.btn,
.btn-outline{
    padding:10px 22px;   /* reduced size */
    font-size:14px;      /* smaller text */
    border-radius:30px;
}

.floating a{
    width:48px;
    height:48px;
    font-size:18px;
}
}

</style>
</head>
