<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

html,body{
    width:100%;
    overflow-x:hidden;
    background:#0b1320;
    color:#fff;
    scroll-behavior:smooth;

    /* Hide scrollbar but keep scrolling */
    -ms-overflow-style: none;
    scrollbar-width: none;
}

html::-webkit-scrollbar,
body::-webkit-scrollbar {
    display: none;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:12px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0b1320;
    border-bottom:1px solid rgba(255,255,255,0.1);
    z-index:1000;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-circle{
    width:60px;
    height:60px;
    border-radius:50%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.logo-circle img{
    width:85%;
}

.logo-text h2{
    font-size:16px;
}

.logo-text p{
    font-size:10px;
    color:#ccc;
}

/* NAV */
nav{
    display:flex;
    align-items:center;
    gap:25px;
}

nav a{
    color:#fff;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
    white-space:nowrap;
}

nav a:hover{
    color:#ff7b00;
}

/* HERO */
.hero{
    min-height:55vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:120px 8% 40px;
    background:
    linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
    url('https://cdn.corenexis.com/f/mVUYQ6YSf6g.jpg') center/cover no-repeat;
}

.hero h1{
    font-size:50px;
}

.hero span{
    color:#ff7b00;
}

.hero p{
    margin-top:15px;
    color:#ddd;
    font-size:18px;
}

/* CONTACT */
.contact{
    padding:70px 8%;
    display:flex;
    justify-content:center;
}

.contact-card{
    width:100%;
    max-width:750px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:35px;
}

.contact-card h3{
    font-size:30px;
    color:#ff7b00;
    margin-bottom:25px;
    text-align:center;
}

.info-item{
    display:flex;
    align-items:center;
    gap:20px;
    padding:18px;
    margin-bottom:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.04);
}

.info-item i{
    width:55px;
    height:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,123,0,0.15);
    color:#ff7b00;
    border-radius:12px;
    font-size:22px;
    flex-shrink:0;
}

.info-text span{
    color:#ccc;
    word-break:break-word;
}

/* FLOATING BUTTONS */
.floating{
    position:fixed;
    right:20px;
    bottom:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:999;
}

.floating a{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:22px;
    text-decoration:none;
}

.phone{background:#ff7b00;}
.email{background:#1e90ff;}
.whatsapp{background:#25d366;}

/* RESPONSIVE */
@media(max-width:1024px){
.hero h1{font-size:42px;}
}

@media(max-width:768px){

header{
    flex-direction:column;
    gap:10px;
}

nav{
    width:100%;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
}

.hero{
    padding-top:160px;
}

.hero h1{font-size:34px;}
.hero p{font-size:16px;}
}

@media(max-width:480px){

nav a{
    font-size:14px;
}

.hero h1{
    font-size:28px;
}

.floating a{
    width:48px;
    height:48px;
    font-size:18px;
}

}

</style>
</head>
